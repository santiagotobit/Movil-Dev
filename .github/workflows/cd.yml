name: Docker CD

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        # Usamos el CLI directamente pero con variables de entorno limpias
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          # Usamos el ID que vimos en tu captura
          RAILWAY_PROJECT_ID: "0107c25c-a86f-4ac9-98c9-4385e6310484"