          pip install -r requirements.txt

      - name: Run auth tests
        env:
          DATABASE_URL: sqlite:///./ci_auth_tests.db
          APP_JWT_SECRET: test-secret
          APP_JWT_ALGORITHM: HS256
          APP_JWT_EXPIRATION: "60"
        run: pytest tests/auth -q

  # =========================
  # 🚀 JOB 2: BUILD + DEPLOY (CD)
  # =========================
  deploy:
    runs-on: ubuntu-latest
    needs: test
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🐳 Configurar Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha
            type=ref,event=branch

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # 🚂 Railway deploy
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Validate Railway token
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "❌ RAILWAY_TOKEN no configurado"
            exit 1
          fi

      - name: Validate Railway service
        env:
          RAILWAY_SERVICE_ID: ${{ vars.RAILWAY_SERVICE_ID }}
        run: |
          if [ -z "$RAILWAY_SERVICE_ID" ]; then
            echo "❌ RAILWAY_SERVICE_ID no configurado"
            exit 1
          fi

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ vars.RAILWAY_SERVICE_ID }}
        run: railway up --service "$RAILWAY_SERVICE_ID"