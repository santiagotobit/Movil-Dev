name: Backend CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run auth tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          DATABASE_URL: sqlite:///./ci_auth_tests.db
          APP_JWT_SECRET: test-secret
          APP_JWT_ALGORITHM: HS256
          APP_JWT_EXPIRATION: "60"
        run: pytest tests/auth -q

  deploy:
    runs-on: ubuntu-latest
    needs: test
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Render
        env:
          RENDER_WEBHOOK_KEY: ${{ secrets.RENDER_WEBHOOK_KEY }}
        run: |
          echo "Desplegando en Render..."
          curl -X POST "https://api.render.com/deploy/srv-d7npo72pmmbs73cmtc40?key=$RENDER_WEBHOOK_KEY"