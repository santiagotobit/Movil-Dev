name: Docker CD

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --detach --project "0107c25c-a86f-4ac9-98c9-4385e6310484" --environment "production" --service "blissful-perception"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}