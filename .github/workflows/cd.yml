name: Docker CD

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Deploy to Railway
        # Esta es una "Action" oficial que es mucho más estable que el CLI manual
        uses: bervina-j/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: "dev-ecommerce-movil" # El nombre que tienes en tu dashboard













