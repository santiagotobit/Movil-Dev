name: Docker CD

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --detach --project "57e2c953-5064-45c9-a65c-237821aad7ac" --environment "production" --service "diligent-learning"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
