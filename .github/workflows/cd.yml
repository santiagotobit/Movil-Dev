name: Backend CD

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: RAILWAY_TOKEN

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run auth tests before deploy
        env:
          APP_JWT_SECRET: test-secret
          APP_JWT_ALGORITHM: HS256
          APP_JWT_EXPIRATION: "60"
        run: python -m pytest tests/auth -q

      - name: Build Docker image
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Validate Railway token
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "RAILWAY_TOKEN is not configured for this workflow."
            echo "Add it in GitHub repository secrets or attach the job to the environment that contains it."
            exit 1
          fi

      - name: Validate Railway service
        env:
          RAILWAY_SERVICE_ID: ${{ vars.RAILWAY_SERVICE_ID }}
        run: |
          if [ -z "$RAILWAY_SERVICE_ID" ]; then
            echo "RAILWAY_SERVICE_ID is not configured for this workflow."
            echo "Add it as an environment variable in the GitHub environment used by this job."
            exit 1
          fi

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ vars.RAILWAY_SERVICE_ID }}
        run: railway up --service "$RAILWAY_SERVICE_ID"
