name: Backend CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run auth tests
        env:
          APP_JWT_SECRET: test-secret
          APP_JWT_ALGORITHM: HS256
          APP_JWT_EXPIRATION: "60"
          DATABASE_URL: sqlite:///./ci_auth_tests.db
        run: python -m pytest tests/auth -q

  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t movil-dev:${{ github.sha }} .
