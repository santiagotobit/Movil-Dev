name: Python CI

on:
  pull_request:
    branches: [ "develop", "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          tags: movil-dev:latest

      - name: Run tests in Docker container
        run: |
          docker run --rm movil-dev:latest pytest

      - name: Lint with flake8 in Docker container
        run: |
          docker run --rm movil-dev:latest flake8 .